name: network-escape-test
version: 1.0.0
jobs:
  build:
    runtime: alpine:3.18
    resources:
      cpu: 0.5
      memory: 256Mi
    steps:
      - name: try-internet
        run: "wget -T 5 http://google.com -O /dev/null 2>&1 || echo 'NETWORK BLOCKED - no internet access'"
      - name: try-registry
        run: "wget -T 5 http://registry:8001/health -O - 2>&1 || echo 'REGISTRY UNREACHABLE'"
