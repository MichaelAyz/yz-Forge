name: publish-lib-http
version: 1.0.0
dependencies:
  - name: lib-core
    version: "^1.0.0"
jobs:
  build:
    runtime: alpine:3.18
    resources:
      cpu: 0.5
      memory: 256Mi
    steps:
      - name: build
        run: "echo 'lib-http built' && mkdir -p out && echo 'http' > out/lib-http.txt && tar czf out.tar.gz out/"
artifacts:
  - name: lib-http
    version: 1.0.0
    path: ./out.tar.gz
