name: shared-workspace-test
version: 1.0.0
jobs:
  job-a:
    runtime: alpine:3.18
    resources:
      cpu: 0.5
      memory: 256Mi
    steps:
      - name: write-file
        run: "echo 'hello shared workspace' > shared.txt"

  job-b:
    runtime: alpine:3.18
    resources:
      cpu: 0.5
      memory: 256Mi
    needs: [job-a]
    steps:
      - name: read-file
        run: "cat shared.txt | grep 'hello shared workspace'"
