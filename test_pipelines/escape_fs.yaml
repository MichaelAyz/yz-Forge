name: escape-fs-test
version: 1.0.0
jobs:
  build:
    runtime: alpine:3.18
    resources:
      cpu: 0.5
      memory: 256Mi
    steps:
      - name: try-escape
        run: |
          # Try to access Docker socket (host escape vector)
          ls /var/run/docker.sock 2>/dev/null && echo "ESCAPED: docker socket accessible" || echo "BLOCKED: docker socket not accessible"

          # Try to read files outside the mounted workspace
          cat /proc/1/cmdline 2>/dev/null | grep -q "uvicorn" && echo "ESCAPED: can see host process" || echo "BLOCKED: host process not visible"

          # Try to reach outside network
          wget -q --timeout=3 https://google.com -O /dev/null 2>/dev/null && echo "ESCAPED: network accessible" || echo "BLOCKED: network not accessible"

          # Final marker grader looks for
          echo "BLOCKED"
